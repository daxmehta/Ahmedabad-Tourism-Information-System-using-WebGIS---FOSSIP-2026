            iconAnchor: [16, 32],    // Which point of the image touches the map coordinate (center, bottom)
            popupAnchor: [0, -32]    // Where the popup opens relative to the anchor
        };

        // Fallback icon in case a category doesn't match
        const defaultIcon = L.icon({
            iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34]
        });

    /* 5. Loop through data and assign to correct category */
    pointsData.forEach(point => {

        // Pick the correct icon based on the category, or use the default if not found
        const markerIcon = icons[point.category] || defaultIcon;

        // Create the marker and assign the custom icon
        const marker = L.marker(point.coords, { icon: markerIcon }).bindPopup(
            `<strong>${point.name}</strong><br><span style="font-size:12px; color:#555;">${point.description}</span>`
        );
        // Add to specific category group
        if (layers[point.category]) {
            marker.addTo(layers[point.category]);
        }
        
        // Add to the master group for bounding box calculation
        marker.addTo(layers.AllPoints);
    });

    // This connects your category groups to a clickable menu!
    const overlayControls = {
        "🎡 Leisure & City Life": layers.Leisure,
        "🌳 Nature & Parks": layers.Nature,
        "🏛️ Historical & Heritage": layers.Heritage,
        "🕉️ Religious (Hindu)": layers.Hindu,
        "☪️ Religious (Muslim)": layers.Muslim,
        "🛕 Religious (Jain)": layers.Jain,
        "🟨 Ahmedabad District": geolayer
    };

    // Add the control panel to the top right
    L.control.layers(null, overlayControls, { collapsed: false, position: 'bottomright' }).addTo(map);



  </script>
